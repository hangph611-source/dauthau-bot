name: Dau Thau Y Te Bot

on:
  schedule:
    - cron: '0 1,4,7,10,13 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cai thu vien
        run: pip install -r requirements.txt

      - name: Chay scraper
        run: python scraper.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Luu danh sach
        run: |
          git config user.name "DauThau Bot"
          git config user.email "bot@dauthau.local"
          git add seen_tenders.json || true
          git diff --staged --quiet || git commit -m "Update seen tenders [skip ci]"
          git push || true
